# GitHub Actions — API 文档自动构建与部署
name: Deploy API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      # 1. 先 checkout 文档网站（在 GITHUB_WORKSPACE 根目录）
      - name: Checkout 文档网站仓库
        uses: actions/checkout@v4
        with:
          repository: ShitTeam/ShitEngine-Docs
          token: ${{ secrets.API_DOCS_TOKEN }}
          path: .

      # 2. 再 checkout 引擎源码到子目录
      - name: Checkout 引擎源码
        uses: actions/checkout@v4
        with:
          path: engine

      - name: 缓存 CMake FetchContent
        uses: actions/cache@v4
        with:
          path: engine/Engine/build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('engine/Engine/cmake/DependencyManager.cmake', 'engine/Engine/CMakeLists.txt') }}

      - name: 安装 SDL3 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libwayland-dev libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libxkbcommon-dev libdbus-1-dev \
            libpulse-dev libpipewire-0.3-dev \
            libdrm-dev libgbm-dev

      - name: 下载最新版 Doxygen
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          cd "$TMPDIR"
          wget -q "https://www.doxygen.nl/files/doxygen-1.17.0.linux.bin.tar.gz"
          tar -xzf doxygen-1.17.0.linux.bin.tar.gz
          sudo cp doxygen-1.17.0/bin/doxygen /usr/local/bin/
          rm -rf "$TMPDIR/doxygen-1.17.0.linux.bin.tar.gz" "$TMPDIR/doxygen-1.17.0"
          doxygen --version

      - name: CMake 配置
        working-directory: engine/Engine
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: 生成 API 文档
        working-directory: engine/Engine
        run: cmake --build build --target docs

      - name: 复制到 docs/public/api/
        run: |
          rm -rf docs/public/api
          cp -r engine/Engine/build/docs/api docs/public/api

      - name: 提交并推送
        run: |
          git config user.name "ShitEngine Bot"
          git config user.email "bot@shitteam.top"
          git add docs/public/api
          git diff --cached --stat HEAD || true
          if git diff --cached --quiet HEAD; then
            echo "无变更，跳过提交"
          else
            git commit -m "auto: 更新 API 文档（来自 ShitEngine@${{ github.sha }}）"
            git push
          fi
