# GitHub Actions — API 文档自动构建
# 引擎推送到 main 时自动生成 Doxygen 文档并放入文档网站仓库的 api/ 目录
name: Deploy API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 引擎源码
        uses: actions/checkout@v4
        with:
          path: engine
          repository: ShitTeam/ShitEngine
          ref: main

      - name: Checkout 文档网站仓库
        uses: actions/checkout@v4
        with:
          path: docs-site
          repository: ShitTeam/ShitEngine-Docs
          token: ${{ secrets.API_DOCS_TOKEN }}

      - name: 安装 Doxygen + SDL3 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen cmake g++ \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libwayland-dev libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libxkbcommon-dev libdbus-1-dev \
            libpulse-dev libpipewire-0.3-dev \
            libdrm-dev libgbm-dev

      - name: CMake 配置
        working-directory: engine
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: 生成 API 文档
        working-directory: engine
        run: cmake --build build --target docs

      - name: 复制到文档网站的 docs/public/api/ 目录
        run: |
          rm -rf docs-site/docs/public/api
          cp -r engine/build/docs/api docs-site/docs/public/api

      - name: 提交并推送到文档网站
        working-directory: docs-site
        run: |
          git config user.name "ShitEngine Bot"
          git config user.email "bot@shitteam.top"
          git add -A
          git diff --quiet && echo "无变更，跳过提交" || \
            (git commit -m "auto: 更新 API 文档（来自 ShitEngine@${{ github.sha }}）" && git push)
