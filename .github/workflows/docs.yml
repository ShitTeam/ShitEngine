# GitHub Actions — API 文档自动构建与部署
# 引擎推送到 main 时自动生成 Doxygen 文档并推送到文档网站仓库的
# docs/public/api/ 目录，VitePress 自动复制到输出根目录 /api/
name: Deploy API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout 文档网站仓库
        uses: actions/checkout@v4
        with:
          repository: ShitTeam/ShitEngine-Docs
          token: ${{ secrets.API_DOCS_TOKEN }}
          path: docs-site

      - name: 安装 SDL3 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libwayland-dev libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libxkbcommon-dev libdbus-1-dev \
            libpulse-dev libpipewire-0.3-dev \
            libdrm-dev libgbm-dev

      - name: 下载最新版 Doxygen
        run: |
          wget -q "https://www.doxygen.nl/files/doxygen-1.13.2.linux.bin.tar.gz"
          tar -xzf doxygen-1.13.2.linux.bin.tar.gz
          sudo cp doxygen-1.13.2/bin/doxygen /usr/local/bin/
          doxygen --version

      - name: CMake 配置
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: 生成 API 文档
        run: cmake --build build --target docs

      - name: 确认生成目录（debug）
        run: |
          echo "=== 查看 build/docs 结构 ==="
          find build -maxdepth 4 -type d | head -20
          echo "=== 查看 docs-site/docs/public ==="
          ls -la docs-site/docs/public/ 2>/dev/null || echo "（尚无）"

      - name: 复制 API 文档到文档网站仓库
        run: |
          rm -rf docs-site/docs/public/api
          cp -r build/docs/api docs-site/docs/public/api
          echo "=== 复制完成，API 文件数 ==="
          find docs-site/docs/public/api -type f | wc -l

      - name: 提交并推送到文档网站
        working-directory: docs-site
        run: |
          git config user.name "ShitEngine Bot"
          git config user.email "bot@shitteam.top"
          git add -A
          git diff --quiet && echo "无变更，跳过提交" || \
            (git commit -m "auto: 更新 API 文档（来自 ShitEngine@${{ github.sha }}）" && git push)
