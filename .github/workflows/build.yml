name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cc: gcc
            cxx: g++
            artifact: ShitEngine-windows-mingw
            deps-setup: |
              curl -L -o ninja.zip https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip
              7z x ninja.zip -oninja > nul
              echo "${{ github.workspace }}/ninja" >> $env:GITHUB_PATH

          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            artifact: ShitEngine-linux
            deps-setup: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build build-essential ccache

          - os: macos-latest
            cc: gcc
            cxx: g++
            artifact: ShitEngine-macos
            deps-setup: |
              brew install cmake ninja ccache

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.deps-setup }}

      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}

      - name: Restore CMake cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('cmake/DependencyManager.cmake', 'CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          ${{ runner.os != 'Windows' && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || '' }}
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix install

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: install/
          if-no-files-found: error
