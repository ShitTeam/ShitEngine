name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cc: gcc
            cxx: g++
            artifact: ShitEngine-windows-mingw
            deps-setup: |
              curl -L -o ninja.zip https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip
              7z x ninja.zip -oninja > nul
              echo "${{ github.workspace }}/ninja" >> $env:GITHUB_PATH

          - os: windows-latest
            cc: cl
            cxx: cl
            artifact: ShitEngine-windows-msvc
            deps-setup: |
              curl -L -o ninja.zip https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip
              7z x ninja.zip -oninja > nul
              echo "${{ github.workspace }}/ninja" >> $env:GITHUB_PATH

          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            artifact: ShitEngine-linux
            deps-setup: |
              sudo apt-get update
              sudo apt-get install -y cmake ninja-build build-essential ccache \
                libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
                libwayland-dev libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
                libxkbcommon-dev libdbus-1-dev libibus-1.0-dev \
                libpulse-dev libpipewire-0.3-dev libasound2-dev \
                libdrm-dev libgbm-dev libudev-dev libthai-dev

          - os: macos-latest
            cc: clang
            cxx: clang++
            artifact: ShitEngine-macos
            deps-setup: |
              brew install ninja ccache

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.deps-setup }}

      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}

      - name: Restore CMake cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build
          key: ${{ matrix.artifact }}-${{ hashFiles('cmake/DependencyManager.cmake', 'CMakeLists.txt') }}
          restore-keys: ${{ matrix.artifact }}-

      - name: Setup MSVC
        if: matrix.cc == 'cl'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure + Build Debug
        shell: bash
        run: |
          cmake -B build/debug -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/debug --parallel

      - name: Configure + Build Release
        shell: bash
        run: |
          cmake -B build/release -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/release --parallel

      - name: Install
        shell: bash
        run: |
          cmake --install build/debug  --prefix install/Debug
          cmake --install build/release --prefix install/Release

      - name: Copy shared libs
        shell: bash
        run: |
          for CONFIG in Debug Release; do
            BUILD="build/$(echo $CONFIG | tr '[:upper:]' '[:lower:]')"
            if [ "$RUNNER_OS" = "Windows" ]; then
              find "$BUILD/_deps" -name "*.dll" -exec cp -n {} install/$CONFIG/bin/ \;
              find "$BUILD/_deps" -name "*.dll.a" -exec cp -n {} install/$CONFIG/lib/ \;
            elif [ "$RUNNER_OS" = "Linux" ]; then
              find "$BUILD/_deps" -name "*.so*" ! -name "*.so.t*" -exec cp -n {} install/$CONFIG/lib/ \;
            elif [ "$RUNNER_OS" = "macOS" ]; then
              find "$BUILD/_deps" -name "*.dylib" -exec cp -n {} install/$CONFIG/lib/ \;
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: install/
          if-no-files-found: error
